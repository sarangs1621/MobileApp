# Local development stack (ADR-025 §7): the web container + a throwaway Postgres.
#
# NOTE: this app is Supabase-backed. The `db` service is a local Postgres you can
# point DATABASE_URL at for running migrations / DB queries against a disposable
# database — but AUTH and STORAGE still require a real Supabase project (set the
# NEXT_PUBLIC_SUPABASE_* + SUPABASE_SERVICE_ROLE vars in `.env`). For a fully
# working local app, point every var at a Supabase project instead of `db`.
#
#   cp .env.example .env   # fill in values
#   docker compose up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-school_portal}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
