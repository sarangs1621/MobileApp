name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test · build · db:validate
    runs-on: ubuntu-latest
    env:
      # No real secrets in CI: env schemas validate at runtime, not build.
      SKIP_ENV_VALIDATION: "true"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Use Node.js (LTS, pinned)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail only on high/critical (ADR-025 §2). Known moderate transitive
      # advisories are tracked in SECURITY_AUDIT.md, not blocking.
      # npm retired pnpm's audit endpoint on 2026-07-15 (HTTP 410 — pnpm/pnpm#11265);
      # no released pnpm uses the bulk endpoint yet. Until then, treat exactly that
      # error as a warning-skip; real audit findings still fail. Drop this fallback
      # once packageManager is bumped to a pnpm whose audit works again.
      - name: Audit dependencies
        run: |
          rc=0
          out=$(pnpm audit --audit-level high --prod 2>&1) || rc=$?
          echo "$out"
          if [ "$rc" -ne 0 ]; then
            echo "$out" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" || exit "$rc"
            echo "::warning::pnpm audit skipped — npm retired the audit endpoint (pnpm/pnpm#11265)"
          fi

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Validate Prisma schema
        run: pnpm run db:validate

  # Builds the production web image, validating the Dockerfile end-to-end
  # (ADR-025 §7). Runs only after the code gate passes.
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: school-portal-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
